# render.yaml — Render Infrastructure as Code
# Deploy: connect your GitHub repo to Render, it will read this file

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: leaderboard-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: leaderboard-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: leaderboard-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: ENABLE_CRON
        value: "true"
      - key: FRONTEND_URL
        value: https://leaderboard-frontend.onrender.com  # Update this

  # ── Frontend SPA ─────────────────────────────────────────────────────────────
  - type: web
    name: leaderboard-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://leaderboard-backend.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://leaderboard-backend.onrender.com/api
      - key: VITE_WS_URL
        value: wss://leaderboard-backend.onrender.com/ws

# ── Databases ──────────────────────────────────────────────────────────────────
databases:
  - name: leaderboard-postgres
    databaseName: leaderboard
    user: leaderboard
    plan: free  # upgrade to starter for production

# ── Redis ──────────────────────────────────────────────────────────────────────
# Render Redis is configured separately in the dashboard.
# Go to: Dashboard → New → Redis → name it "leaderboard-redis"
# Then link it to the backend service via the REDIS_URL env var above.
